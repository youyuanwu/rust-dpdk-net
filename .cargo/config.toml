[target.x86_64-unknown-linux-gnu]
# If using hardware DPDK devices, may need to run tests with sudo
# runner = "sudo -E"

# Use Nehalem (corei7) CPU target for QEMU software emulation compatibility
# This matches DPDK's cpu_instruction_set=generic setting
rustflags = ["-C", "target-cpu=nehalem"]

[target.aarch64-unknown-linux-gnu]
# The system GNU BFD `ld` is extremely slow linking the large test binaries on
# aarch64 (Rust only defaults to lld on x86_64). Use lld instead to drastically
# cut link times. Requires `lld` to be installed (provides /usr/bin/ld.lld).
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# One job at a time to avoid port conflicts
[test]
jobs = 1
